    secrets: inherit

  push-image-circuit_breaker-real_service:
    needs: build-jar
    uses: ./.github/workflows/every_night_push_image_into_docker_repository.yml
    with:
      image_name: circuit_breaker@real_service
      image_name_for_docker_hub: circuit_breaker.real_service
    secrets: inherit

  push-image-service-discovery-self-registration:
    needs: build-jar
    uses: ./.github/workflows/every_night_push_image_into_docker_repository.yml
    with:
      image_name: service_registry@self_registration
      image_name_for_docker_hub: service_registry.self_registration
    secrets: inherit

  push-image-service-A-self-registration:
    needs: build-jar
    uses: ./.github/workflows/every_night_push_image_into_docker_repository.yml
    with:
      image_name: serviceA@self_registration
      image_name_for_docker_hub: serviceA.self_registration
    secrets: inherit

  push-image-service-A-client-side-discovery:
    needs: build-jar
    uses: ./.github/workflows/every_night_push_image_into_docker_repository.yml
    with:
      image_name: serviceA@client_side_discovery
      image_name_for_docker_hub: serviceA.client_side_discovery
    secrets: inherit

  push-image-client-client-side-discovery:
    needs: build-jar
    uses: ./.github/workflows/every_night_push_image_into_docker_repository.yml
    with:
      image_name: client@client_side_discovery
      image_name_for_docker_hub: client.client_side_discovery
    secrets: inherit

  push-image-service-discovery-client-side-discovery:
    needs: build-jar
    uses: ./.github/workflows/every_night_push_image_into_docker_repository.yml
    with:
      image_name: service_registry@client_side_discovery
      image_name_for_docker_hub: service_registry.client_side_discovery
