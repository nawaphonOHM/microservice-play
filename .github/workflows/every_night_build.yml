  push-image-service-A-server-side-discovery:
    needs: build-jar
    uses: ./.github/workflows/every_night_push_image_into_docker_repository.yml
    with:
      image_name: serviceA@server_side_discovery
      image_name_for_docker_hub: serviceA.server_side_discovery
    secrets: inherit

  push-image-order-service-transactional-outbox-pattern:
    needs: build-jar
    uses: ./.github/workflows/every_night_push_image_into_docker_repository.yml
    with:
