      image_name_for_docker_hub: rest.sender
    secrets: inherit

  push-image-rest-receiver:
    needs: build-jar
    uses: ./.github/workflows/every_night_push_image_into_docker_repository.yml
    with:
      image_name: rest@receiver
      image_name_for_docker_hub: rest.receiver
    secrets: inherit

  push-image-event_sourcing-consumer:
    needs: build-jar
    uses: ./.github/workflows/every_night_push_image_into_docker_repository.yml
    with:
      image_name: event_sourcing@consumer
      image_name_for_docker_hub: event_sourcing.consumer
    secrets: inherit

  push-image-event_sourcing-producer:
    needs: build-jar
    uses: ./.github/workflows/every_night_push_image_into_docker_repository.yml
    with:
      image_name: event_sourcing@producer
      image_name_for_docker_hub: event_sourcing.producer
    secrets: inherit

  push-image-graphql-gateway:
    needs: build-jar
    uses: ./.github/workflows/every_night_push_image_into_docker_repository.yml
    with:
      image_name: graphql@gateway
      image_name_for_docker_hub: graphql.gateway
    secrets: inherit

  push-image-circuit_breaker-proxy:
    needs: build-jar
    uses: ./.github/workflows/every_night_push_image_into_docker_repository.yml
    with:
      image_name: circuit_breaker@proxy
