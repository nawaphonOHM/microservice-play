name: push images into docker hub
on:
  workflow_call:
    inputs:
      image_name:
        required: true
        type: string
      image_name_for_docker_hub:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_SECRET:
        required: true

run-name: pushing images into docker hub

jobs:
  push_image:
    name: push <docker-repo-name>/microservices-lab:${{inputs.image_name_for_docker_hub}} image into docker hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Download ${{ inputs.image_name }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.image_name }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_SECRET }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: push ${{ inputs.image_name_for_docker_hub }} image into docker hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/microservices-lab:${{inputs.image_name_for_docker_hub}}
