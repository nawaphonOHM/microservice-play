name: push images into docker hub
on:
  workflow_dispatch:


permissions:
  contents: read


jobs:

  push_image:
    strategy:
      matrix: ${{ fromJSON(vars.MATRIX) }}
    runs-on: ubuntu-latest

    steps:
      - name: Download ${{ format('artifact={0};image={1}', matrix.project_name, matrix.image_name) }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.image_name }}

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_SECRET }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Push ${{ format('{0} image', inputs.image_name_for_docker_hub) }} into docker hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ format('{0}/microservice-using-docker-build:{1}', secrets.DOCKER_USERNAME, inputs.image_name_for_docker_hub) }}
