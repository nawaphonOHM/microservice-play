name: setup_java_and_gradle
author: nawaphon
description: setup_java_and_gradle

runs:
  using: "composite"
  steps:

    - name: Set up JDK 21 for x64
      uses: actions/setup-java@v4.0.0
      with:
        java-version: '21'
        architecture: x64
        distribution: 'oracle'

    - name: Validate Gradle wrapper
      uses: gradle/wrapper-validation-action@v3

    - name: Setup gradle
      uses: gradle/actions/setup-gradle@v3