name: clone_build_and_upload_artifact
author: nawaphon
description: clone build and upload artifact
inputs:
  project_name:
    description: "The name of the project to build"
    required: true
  image:
    description: "The name of the image to build"
    required: true
  path:
    description: "The path to the artifact to upload"
    required: true

runs:
  using: "composite"

  steps:
    - name: checkout codebase
      uses: ./.github/actions/checkout_codebase

    - name: Setting up tool for project ${{ inputs.project_name }}
      uses: ./.github/actions/setup_tools

    - name: gradlew build ${{ inputs.project_name }}
      run: ./gradlew ${{ format(':{0}:build --scan', inputs.project_name) }}
      shell: bash

    - name: upload ${{ format('{0} ''s artifact', inputs.project_name) }}
      uses: ./.github/actions/upload_artifact
      with:
        path: ${{ inputs.path }}
        image_name: ${{ inputs.image }}