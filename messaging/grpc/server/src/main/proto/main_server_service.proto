syntax = "proto3";
import "uuid.proto";
import "customer_message.proto";
import "customer_detail_message.proto";

option java_multiple_files = true;
option java_package = 'nawaphon.microservices.messaging.grpc.server';


service MainServerService {
  rpc Customer(UUID) returns (CustomerMessage) {}
  rpc CustomerDetail(UUID) returns (CustomerDetailMessage) {}
}