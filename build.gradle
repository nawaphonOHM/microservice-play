plugins {
    id 'org.springframework.boot' version "${springBootVersion}" apply false
    id 'io.spring.dependency-management' version "${springBootDependencyManagement}" apply false
    id 'com.google.protobuf' version "${protobufPluginVersion}" apply false
}

allprojects {
    repositories {
        mavenCentral()
    }

    plugins.withId('java') {
        java {
            toolchain {
                languageVersion = JavaLanguageVersion.of(javaVersion as int)
            }
        }
    }
}

configure(subprojects.findAll { it.name in ["messaging@grpc@server", "messaging@grpc@client"] }) {

    apply plugin: 'com.google.protobuf'
    apply plugin: 'java'
    apply plugin: 'org.springframework.boot'
    apply plugin: 'io.spring.dependency-management'

    dependencies {
        implementation 'org.springframework.boot:spring-boot-starter'
        implementation 'org.springframework.grpc:spring-grpc-spring-boot-starter'
        implementation 'org.springframework.boot:spring-boot-starter-webmvc'

        testImplementation 'org.springframework.boot:spring-boot-starter-test'
        testImplementation 'org.springframework.grpc:spring-grpc-test'
        testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
        testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
    }

    dependencyManagement {
        imports {
            mavenBom "org.springframework.grpc:spring-grpc-dependencies:" + springGrpcVersion
        }
    }

    protobuf {
        protoc {
            artifact = 'com.google.protobuf:protoc'
        }
        plugins {
            grpc {
                artifact = 'io.grpc:protoc-gen-grpc-java'
            }
        }
        generateProtoTasks {
            all()*.plugins {
                grpc {
                    option '@generated=omit'
                }
            }
        }
    }

    tasks.named('test') {
        useJUnitPlatform()
    }
}

